<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Da Database 😎🕶️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="purge-auth-overlay" style="display:none;">
        <div class="terminal-box">
            <h2 style="color:#ff3131;">PURGE_AUTHORIZATION</h2>
            <input type="password" id="purgeCodeField" placeholder="NUCLEAR_KEY">
            <button class="btn-inject" id="confirmPurgeBtn">CONFIRM</button>
            <button class="btn-inject" style="background:#444;" onclick="cancelPurge()">CANCEL</button>
        </div>
    </div>

    <canvas id="matrix-canvas"></canvas>
    <div class="scanline"></div>

    <div class="container">
        <header>
            <h1 class="glitch-text">Da Database 😎🕶️</h1>
            <div class="status-bar">
                <span id="clock">00:00:00</span> | <span class="neon-text">HIVE_MIND: ACTIVE</span>
            </div>
        </header>

        <section class="main-layout">
            <div class="vault-section">
                <div class="controls">
                    <div class="inject-form">
                        <input type="text" id="newName" placeholder="ITEM NAME">
                        <input type="text" id="newId" placeholder="ROBLOX ID">
                        <input type="text" id="newDesc" placeholder="USAGE GUIDE">
                        <select id="newCat">
                            <option value="gears">GEARS</option>
                            <option value="music">AUDIO</option>
                        </select>
                        <button class="btn-inject" onclick="addItem()">+ INJECT</button>
                    </div>
                    <div class="category-grid">
                        <button class="cat-btn active" onclick="filterCat('all', this)">ALL</button>
                        <button class="cat-btn" onclick="filterCat('music', this)">AUDIO</button>
                        <button class="cat-btn" onclick="filterCat('gears', this)">GEARS</button>
                        <button class="btn-inject" style="background:#444;" onclick="exportJSON()">BACKUP_JSON</button>
                    </div>
                </div>
                <div id="vault-grid" class="vault-grid"></div>
            </div>

            <div class="chat-section">
                <h3>GLOBAL_COMMS [Clears Daily]</h3>
                <div id="chat-box"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatMsg" placeholder="TYPE MESSAGE...">
                    <button onclick="sendChat()">SEND</button>
                </div>
            </div>
        </section>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
