<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_OVERRIDE | ID VAULT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="scanline"></div>

    <div class="container">
        <header>
            <h1 class="glitch-text">LPI_VAULT_OS</h1>
            <div class="status-bar">
                <span id="clock">00:00:00</span> | 
                <span class="neon-text">CONNECTION: ENCRYPTED</span>
            </div>
        </header>

        <section class="controls">
            <div class="inject-form">
                <input type="text" id="newName" placeholder="ITEM NAME">
                <input type="text" id="newId" placeholder="ID NUMBER">
                <select id="newCat">
                    <option value="gears">GEARS</option>
                    <option value="music">AUDIO</option>
                    <option value="cords">CORDS</option>
                    <option value="npcs">NPCs</option>
                    <option value="misc">MISC</option>
                </select>
                <button class="btn-inject" onclick="addItem()">+ INJECT_DATA</button>
            </div>
            
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="QUERY DATABASE..." onkeyup="search()">
            </div>
            
            <div class="category-grid">
                <button class="cat-btn active" onclick="filterCat('all', this)">ALL_SYSTEMS</button>
                <button class="cat-btn" onclick="filterCat('music', this)">AUDIO</button>
                <button class="cat-btn" onclick="filterCat('gears', this)">GEARS</button>
                <button class="cat-btn" onclick="filterCat('cords', this)">CORDS</button>
                <button class="cat-btn" onclick="filterCat('npcs', this)">NPCs</button>
            </div>
        </section>

        <div id="vault-grid" class="vault-grid">
            <p class="loading-text">INITIALIZING DATABASE...</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
