<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | ID VAULT</title>
    <link rel="stylesheet" href="style.css"> <!-- Links the CSS -->
</head>
<body>
    <div id="matrix-bg"></div> <!-- For the animation -->
    
    <header>
        <h1>SYSTEM_VAULT v2.0</h1>
        <div id="clock">00:00:00</div>
    </header>

    <div class="controls">
        <input type="text" id="newName" placeholder="Item Name">
        <input type="text" id="newId" placeholder="ID Number">
        <select id="newCat">
            <option value="Gear">Gear</option>
            <option value="Music">Music</option>
            <option value="Vehicle">Vehicle</option>
        </select>
        <button class="btn-add" onclick="addItem()">+ INJECT_DATA</button>
        <br><br>
        <div class="search-wrapper">
            <input type="text" id="searchBar" placeholder="SEARCH_DATABASE..." onkeyup="search()">
            <button onclick="clearSearch()">X</button>
        </div>
    </div>

    <div class="categories" id="catFilters">
        <!-- Counters will be added here by JS -->
    </div>

    <div class="container" id="vault"></div>

    <div class="backup-tools">
        <button onclick="exportData()">DOWNLOAD_BACKUP</button>
        <input type="file" id="importFile" onchange="importData(event)" style="display:none">
        <button onclick="document.getElementById('importFile').click()">RESTORE_BACKUP</button>
    </div>

    <script src="script.js"></script> <!-- Links the JS -->
</body>
</html>
